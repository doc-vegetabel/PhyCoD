case_name: "cantilever_tipload_edgewise"

description: "BeamDyn standalone static benchmark using edgewise tip load on NREL 5MW reference files"

beamdyn:
  driver_input_file: "data/raw/reference_cases/beamdyn/nrel5mw/bd_driver_static_nrel_5mw.inp"
  notes: "Run BeamDyn standalone static example with edgewise tip load by copying case files to results directory first."

loads:
  type: "tip_load"
  magnitude_N: 1000.0
  direction: "edgewise"

boundary_conditions:
  root: "fixed"
  tip: "free"