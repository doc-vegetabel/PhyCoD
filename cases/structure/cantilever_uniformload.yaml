case_name: "cantilever_uniformload"

description: "BeamDyn standalone static benchmark using full-span uniform distributed load on NREL 5MW reference files"

beamdyn:
  driver_input_file: "data/raw/reference_cases/beamdyn/nrel5mw/bd_driver_static_nrel_5mw.inp"
  notes: "Run BeamDyn standalone static example with full-span distributed load by copying case files to results directory first."

loads:
  type: "distributed_load"
  magnitude_N: 100.0
  direction: "flapwise"

boundary_conditions:
  root: "fixed"
  tip: "free"